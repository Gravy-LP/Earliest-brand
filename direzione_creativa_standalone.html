    const manifest = JSON.parse(manifestEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

    // which fired before we swapped the document. Trigger manually if present.

      window.Babel.transformScriptTags();

cyan:#00E5D2;\n    --lime:#C6FF00;\n    --gray-50:#F5F7FA;\n    --gray-100:#EDEFF3;\n    --gray-200:#D8DCE3;\n    --gray-500:#5F6573;\n    --ink:#111317;\n    --font: 'Inter', system-ui, -apple-system, sans-serif;\n    --mono: 'JetBrains Mono', ui-monospace, monospace;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{background:var(--gray-50);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;font-feature-settings:\"ss01\",\"cv11\"}\n  body{overflow-x:hidden}\n  img{display:block;max-width:100%}\n  a{color:inherit}\n\n  /* shared section frame */\n  section{position:relative;padding:140px 64px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}\n  .container{max-width:1440px;margin:0 auto;width:100%}\n  .eyebrow{font-size:13px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--blue);display:inline-flex;align-items:center;gap:14px}\n  .eyebrow::before{content:\"\";display:inline-block;width:28px;height:2px;background:var(--blue)}\n  .eyebrow.on-dark{color:var(--cyan)}\n  .eyebrow.on-dark::before{background:var(--cyan)}\n  .section-head{display:flex;flex-direction:column;align-items:center;text-align:center;gap:24px;margin-bottom:72px;margin-top:24px}\n  .section-head .section-title{max-width:18ch}\n  .section-head .lead{max-width:54ch}\n  h1,h2,h3{font-family:var(--font);font-weight:800;letter-spacing:-.025em;line-height:.92}\n  h2.display{font-size:clamp(56px,7vw,128px);font-weight:900;letter-spacing:-.04em}\n  h3.section-title{font-size:clamp(36px,4vw,68px);font-weight:800;letter-spacing:-.03em;line-height:.98}\n  .lead{font-size:clamp(16px,1.15vw,19px);line-height:1.55;color:var(--gray-500);max-width:60ch}\n  .label{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-500)}\n  .label.on-dark{color:#9AA3B2}\n\n  /* progress + nav */\n  .topbar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px 22px;pointer-events:none}\n  .brand-pill{display:inline-flex;align-items:center;gap:10px;padding:8px 14px 8px 8px;border-radius:999px;background:rgba(255,255,255,.78);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border:1px solid rgba(10,15,28,.06);box-shadow:0 4px 18px rgba(10,15,28,.05);pointer-events:auto}\n  .brand-pill .bp-mark{width:30px;height:30px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;border:1px solid rgba(10,15,28,.06)}\n  .brand-pill .bp-mark img{width:78%;height:auto}\n  .brand-pill .bp-text{display:flex;flex-direction:column;line-height:1;color:var(--navy)}\n  .brand-pill .bp-name{font-size:12px;font-weight:800;letter-spacing:-.005em}\n  .brand-pill .bp-name b{color:var(--blue)}\n  .brand-pill .bp-sub{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--gray-500);margin-top:3px}\n  .topbar-right{display:inline-flex;align-items:center;gap:10px;padding:8px 14px;border-radius:999px;background:rgba(10,15,28,.78);backdrop-filter:blur(14px);color:#fff;font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;pointer-events:auto}\n  .topbar-right .pulse{width:7px;height:7px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 3px rgba(198,255,0,.22)}\n  .progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--purple),var(--cyan));width:0%;z-index:60;transition:width .12s linear}\n\n  /* shared brand-tinted light background (matches cover) */\n  .bg-radiant{\n    background:\n      radial-gradient(circle at 85% 15%, rgba(37,99,255,.18) 0%, transparent 45%),\n      radial-gradient(circle at 10% 90%, rgba(198,255,0,.18) 0%, transparent 40%),\n      radial-gradient(circle at 50% 50%, rgba(0,229,210,.10) 0%, transparent 60%),\n      linear-gradient(135deg, #F8FAFF 0%, #F0F3FA 100%);\n  }\n\n  /* ============ 01 COVER ============ */\n  .cover{\n    background:\n      radial-gradient(circle at 85% 15%, rgba(37,99,255,.18) 0%, transparent 45%),\n      radial-gradient(circle at 10% 90%, rgba(198,255,0,.18) 0%, transparent 40%),\n      radial-gradient(circle at 50% 50%, rgba(0,229,210,.10) 0%, transparent 60%),\n      linear-gradient(135deg, #F8FAFF 0%, #F0F3FA 100%);\n    overflow:hidden;padding-top:120px;padding-bottom:0;min-height:100vh}\n  .cover-grid{display:grid;grid-template-columns:1fr;gap:40px;align-items:center;justify-items:center;text-align:center}\n  .cover-meta{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid #d4d8df;padding-top:18px;margin-top:60px;width:100%}\n  .cover-meta .l{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#5F6573}\n  .cover-lockup{display:flex;flex-direction:column;align-items:center;text-align:center;gap:28px;max-width:1100px}\n  .cover-lockup .mark{width:min(200px,24vw)}\n  .cover-title{font-size:clamp(56px,7.5vw,128px);font-weight:900;letter-spacing:-.045em;line-height:.88;color:var(--ink)}\n  .cover-title em{font-style:normal;color:var(--blue)}\n  .cover-title .bang{color:var(--blue)}\n  .cover-sub{display:flex;align-items:baseline;justify-content:center;gap:12px;flex-wrap:wrap;font-size:clamp(13px,1.05vw,16px);font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);margin-top:20px}\n  .cover-sub b{color:var(--blue);font-weight:800}\n  .scroll-cue{position:absolute;bottom:32px;right:64px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink)}\n  .scroll-cue .line{width:48px;height:1px;background:var(--ink);position:relative;overflow:hidden}\n  .scroll-cue .line::after{content:\"\";position:absolute;left:-30%;top:0;bottom:0;width:30%;background:var(--blue);animation:slide 1.6s infinite ease-in-out}\n  @keyframes slide{0%{left:-30%}100%{left:100%}}\n\n  .cover-corner{position:absolute;display:flex;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#5F6573}\n  .cc-tl{top:24px;left:28px}\n  .cc-tr{top:24px;right:28px}\n  .cc-bl{bottom:24px;left:28px}\n\n  /* ============ 02 MANIFESTO ============ */\n  .manifesto{background:var(--navy);color:#fff;overflow:hidden}\n  .manifesto .quote{font-size:clamp(48px,6vw,108px);font-weight:800;letter-spacing:-.04em;line-height:.96;max-width:18ch}\n  .manifesto .quote em{font-style:normal;color:var(--blue)}\n  .manifesto .quote .u{position:relative;display:inline-block}\n  .manifesto .quote .u::after{content:\"\";position:absolute;left:0;right:0;bottom:-6px;height:8px;background:var(--lime);border-radius:6px}\n  .manifesto .foot{display:flex;flex-direction:column;gap:40px;margin-top:64px;align-items:center}\n  .manifesto .foot p{font-size:18px;line-height:1.55;color:#cbd1de;max-width:60ch;text-align:center}\n  .manifesto .badge{display:inline-flex;align-items:center;gap:10px;padding:8px 14px;border:1px solid rgba(255,255,255,.18);border-radius:999px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#cbd1de}\n  .manifesto .badge .pulse{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 4px rgba(0,229,210,.22)}\n\n  /* ============ 03 SYMBOL / ANATOMY ============ */\n  .symbol{\n    background:\n      radial-gradient(circle at 15% 20%, rgba(37,99,255,.18) 0%, transparent 45%),\n      radial-gradient(circle at 90% 80%, rgba(198,255,0,.16) 0%, transparent 40%),\n      radial-gradient(circle at 50% 50%, rgba(0,229,210,.10) 0%, transparent 60%),\n      linear-gradient(135deg, #F8FAFF 0%, #F0F3FA 100%);\n    overflow:hidden}\n  .symbol .grid{display:grid;grid-template-columns:1fr 1.1fr;gap:80px;align-items:center;margin-top:64px}\n  .symbol-stage{aspect-ratio:1/1;background:var(--gray-50);border-radius:32px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}\n  .symbo 1 Cover\">\n  <div class=\"cover-corner cc-tl\">M&lt; / Brand book v.01<\u002Fdiv>\n  <div class=\"cover-corner cc-tr\">Catania · 2026<\u002Fdiv>\n  <div class=\"cover-corner cc-bl\">Document № MC—2026—001<\u002Fdiv>\n\n  <div class=\"container\">\n    <div class=\"cover-grid\">\n      <div class=\"cover-lockup\">\n        <div class=\"eyebrow\">Direzione Creativa<\u002Fdiv>\n        <img class=\"mark\" src=\"734aff92-e48b-488a-86d5-fead569c50eb\" alt=\"Melo Comunichi mark\">\n        <div>\n          <h1 class=\"cover-title\">MELO<br>COMUNICHI<span class=\"bang\">!<\u002Fspan><\u002Fh1>\n          <div class=\"cover-sub\">Ideas that <b>talk.<\u002Fb> &nbsp;·&nbsp; Results that <b>stay.<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"cover-meta\">\n        <div class=\"l\">Una guida alla nostra<br>direzione creativa e visiva.<\u002Fdiv>\n        <div class=\"l\" style=\"text-align:right\">12 sezioni<br>1 sistema vivo<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"scroll-cue\"><span>Scorri<\u002Fspan><span class=\"line\"><\u002Fspan><span>01 / 12<\u002Fspan><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====================== 02 MANIFESTO ====================== -->\n<section class=\"manifesto\" data-screen-label=\"02 Manifesto\">\n  <div class=\"container\" style=\"display:flex;flex-direction:column;align-items:center;text-align:center\">\n    <div class=\"eyebrow on-dark\">02 — Manifesto<\u002Fdiv>\n    <h2 class=\"quote\" style=\"margin-top:32px\">\n      We make ideas <em>speak<\u002Fem><br>\n      <span class=\"u\">loud and clear.<\u002Fspan>\n    <\u002Fh2>\n    <div class=\"foot\" style=\"justify-items:center;text-align:center;align-items:center\">\n      <p>Siamo un'agenzia di comunicazione creativa e strategica. Trasformiamo idee in messaggi efficaci, capaci di farsi notare, emozionare e <b style=\"color:#fff\">lasciare il segno<\u002Fb>. Dalla strategia ai contenuti, dal design ai social: costruiamo identità, raccontiamo storie, generiamo valore.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:14px;align-items:center\">\n        <span class=\"badge\"><span class=\"pulse\"><\u002Fspan>Branding · Content · Ads · Strategy<\u002Fspan>\n        <span class=\"label on-dark\">Catania, IT — Viale delle Olimpiadi 22<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- moving marquee bridge -->\n<div class=\"marquee\" aria-hidden=\"true\">\n  <div class=\"track\">\n    <span>IDEE CHE PARLANO<span class=\"dot\"><\u002Fspan><\u002Fspan>\n    <span>RISULTATI CHE RESTANO<span class=\"dot\"><\u002Fspan><\u002Fspan>\n    <span>IDEE CHE PARLANO<span class=\"dot\"><\u002Fspan><\u002Fspan>\n    <span>RISULTATI CHE RESTANO<span class=\"dot\"><\u002Fspan><\u002Fspan>\n    <span>IDEE CHE PARLANO<span class=\"dot\"><\u002Fspan><\u002Fspan>\n    <span>RISULTATI CHE RESTANO<span class=\"dot\"><\u002Fspan><\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ====================== 03 SYMBOL ====================== -->\n<section class=\"symbol\" data-screen-label=\"03 Logo\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n      <div class=\"eyebrow\">03 — Il Simbolo<\u002Fdiv>\n      <h3 class=\"section-title\">Una M che strizza l'occhio<br>e <span style=\"color:var(--blue)\">sorride<\u002Fspan>.<\u002Fh3>\n      <p class=\"lead\">Il nostro marchio è una conversazione. La <b style=\"color:var(--ink)\">M<\u002Fb> di Melo, il segno <b style=\"color:var(--ink)\">&lt;<\u002Fb> come occhiolino, lo smile come promessa di un risultato che fa stare bene. Nessun elemento è decorativo: ognuno dice qualcosa.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"grid\">\n      <div class=\"symbol-stage\">\n        <svg class=\"guides\" viewBox=\"0 0 100 100\" preserveAspectRatio=\"none\">\n          <line x1=\"0\" y1=\"20\" x2=\"100\" y2=\"20\"><\u002Fline>\n          <line x1=\"0\" y1=\"50\" x2=\"100\" y2=\"50\"><\u002Fline>\n          <line x1=\"0\" y1=\"80\" x2=\"100\" y2=\"80\"><\u002Fline>\n          <line x1=\"15\" y1=\"0\" x2=\"15\" y2=\"100\"><\u002Fline>\n          <line x1=\"50\" y1=\"0\" x2=\"50\" y2=\"100\"><\u002Fline>\n          <line x1=\"85\" y1=\"0\" x2=\"85\" y2=\"100\"><\u002Fline>\n        <\u002Fsvg>\n        <img src=\"734aff92-e48b-488a-86d5-fead569c50eb\" alt=\"M&lt; mark\" style=\"width:72%;height:auto;position:relative;z-index:1\">\n      <\u002Fdiv>\n\n      <div class=\"anatomy-list\">\n        <div class=\"anatomy-item\">\n          <div class=\"n\">01<\u002Fdiv>\n          <div>\n            <div class=\"t\">La M — la voce del brand<\u002Fdiv>\n            <div class=\"d\">Geometrica, robusta, costruita su archi morbidi. È il nome, ma anche il punto di partenza di ogni messaggio.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"swatch\" style=\"background:#2563FF\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anatomy-item\">\n          <div class=\"n\">02<\u002Fdiv>\n          <div>\n            <div class=\"t\">Il segno &lt; — l'occhiolino<\u002Fdiv>\n            <div class=\"d\">Una citazione del codice e del parlato. Strizza l'occhio al digitale, all'ascolto, alla complicità con chi ci sceglie.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"swatch\" style=\"background:#0A0F1C\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anatomy-item\">\n          <div class=\"n\">03<\u002Fdiv>\n          <div>\n            <div class=\"t\">Lo smile — il risultato<\u002Fdiv>\n            <div class=\"d\">La curva di chiusura. Promette che ogni progetto finisce bene: con un risultato che fa sorridere chi ci ha creduto.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"swatch\" style=\"background:#0A0F1C\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anatomy-item\">\n          <div class=\"n\">04<\u002Fdiv>\n          <div>\n            <div class=\"t\">Sistema vivo, non statico<\u002Fdiv>\n            <div class=\"d\">Il marchio cambia espressione a seconda del contesto. Il logo non recita: <b>conversa<\u002Fb>.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"swatch\" style=\"background:#C6FF00\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====================== 04 M< EFFECT ====================== -->\n<section class=\"effect\" data-screen-label=\"04 M Effect\">\n  <div class=\"container\">\n    <div class=\"head\">\n      <div class=\"eyebrow\">04 — The M&lt; Effect<\u002Fdiv>\n      <h3 class=\"section-title\">Sei espressioni,<br>una sola voce.<\u002Fh3>\n      <p class=\"lead\">Un sistema di emoji-logo che adatta il marchio al contenuto: <em style=\"font-style:normal;color:var(--blue);font-weight:600\">happy<\u002Fem> per l'istituzionale, <em style=\"font-style:normal;color:var(--blue);font-weight:600\">focus<\u002Fem> per le ads, <em style=\"font-style:normal;color:var(--blue);font-weight:600\">idea<\u002Fem> per la strategia, <em style=\"font-style:normal;color:var(--blue);font-weight:600\">play<\u002Fem> per i video.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"effect-grid\">\n      <div class=\"effect-card\">\n        <svg viewBox=\"0 0 400 360\" xmlns=\"http://www.w3.org/2000/svg\">\n          <path d=\"M 60 280 L 60 60 L 165 200 L 270 60 L 270 280\" fill=\"none\" stroke=\"#2563FF\" stroke-width=\"50\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n          <path d=\"M 360 130 L 320 175 L 360 220\" fill=\"none\" stroke=\"#0A0F1C\" stroke-width=\"22\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n          <path d=\"M 175 280 Q 265 360 350 280\" fill=\"none\" stroke=\"#0A0F1C\" stroke-width=\"24\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n        <span class=\"n\">01<\u002Fspan><span class=\"name\">Happy<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"effect-card\">\n        <svg viewBox=\"0 0 400 360\" xmlns=\"http://www.w3.org/2000/svg\">\n          <path d=\"M 60 280 L 60 60 L 165 200 L 270 60 L 270 280\" fill=\"none\" stroke=\"#2563FF\" stroke-width=\"50\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n          <path d=\"M 318 175 L 362 175\" fill=\"none\" stroke=\"#0A0F1C\" stroke-width=\"22\" stroke-linecap=\"round\"><\u002Fpath>\n          <path d=\"M 175 280 Q 265 360 350 280\" fill=\"none\" stroke=\"#0A0F1C\" stroke-width=\"24\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n        <span class=\"n\">02<\u002Fspan><span class=\"name\">Wink<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"effect-card\">\n        <svg viewBox=\"0 0 400 360\" xmlns=\"http://www.w3.org/2000/svg\">\n          <path d=\"M 60 280 L 60 60 L 165 200 L 270 60 L 270 280\" fill=\"none\" stroke=\"#2563FF\" stroke-width=\"50\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n          <circle cx=\"340\" cy=\"175\" r=\"22\" fill=\"#0A0F1C\"><\u002Fcircle>\n          <ellipse cx=\"240\" cy=\"310\" rx=\"22\" ry=\"30\" fill=\"#0A0F1C\"><\u002Fellipse>\n        <\u002Fsvg>\n        <span class=\"n\">03<\u002Fspan><span class=\"name\">Wow<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"effect-card\">\n        <svg viewBox=\"0 0 400 400\" xmlns=\"http://www.w3.org/2000/svg\">\n          <path d=\"M 60 320 L 60 100 L 165 240 L 270 100 L 270 320\" fill=\"none\" stroke=\"#2563FF\" stroke-width=\"50\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n          <path d=\"M 360 170 L 320 215 L 360 260\" fill=\"none\" stroke=\"#0A0F1C\" stroke-width=\"22\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n          <path d=\"M 175 320 Q 265 400 350 320\" fill=\"none\" stroke=\"#0A0F1C\" stroke-width=\"24\" stroke-linecap=\"round\"><\u002Fpath>\n          <path d=\"M 340 60 L 340 25 M 378 75 L 398 50 M 302 75 L 282 50 M 388 110 L 412 110 M 292 110 L 268 110\" stroke=\"#0A0F1C\" stroke-width=\"9\" stroke-linecap=\"round\"><\u002Fpath>\n          <circle cx=\"340\" cy=\"90\" r=\"18\" fill=\"#C6FF00\" stroke=\"#0A0F1C\" stroke-width=\"6\"><\u002Fcircle>\n        <\u002Fsvg>\n        <span class=\"n\">04<\u002Fspan><span class=\"name\">Idea<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"effect-card\">\n        <svg viewBox=\"0 0 400 360\" xmlns=\"http://www.w3.org/2000/svg\">\n          <path d=\"M 60 280 L 60 60 L 165 200 L 270 60 L 270 280\" fill=\"none\" stroke=\"#2563FF\" stroke-width=\"50\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n          <circle cx=\"340\" cy=\"175\" r=\"25\" fill=\"none\" stroke=\"#0A0F1C\" stroke-width=\"10\"><\u002Fcircle>\n          <circle cx=\"340\" cy=\"175\" r=\"7\" fill=\"#0A0F1C\"><\u002Fcircle>\n          <path d=\"M 175 280 Q 265 360 350 280\" fill=\"none\" stroke=\"#0A0F1C\" stroke-width=\"24\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n        <span class=\"n\">05<\u002Fspan><span class=\"name\">Focus<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"effect-card\">\n        <svg viewBox=\"0 0 400 360\" xmlns=\"http://www.w3.org/2000/svg\">\n          <path d=\"M 60 280 L 60 60 L 165 200 L 270 60 L 270 280\" fill=\"none\" stroke=\"#2563FF\" stroke-width=\"50\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n          <path d=\"M 318 140 L 370 175 L 318 210 Z\" fill=\"#0A0F1C\"><\u002Fpath>\n          <path d=\"M 175 280 Q 265 360 350 280\" fill=\"none\" stroke=\"#0A0F1C\" stroke-width=\"24\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n        <span class=\"n\">06<\u002Fspan><span class=\"name\">Play<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====================== 05 COLORS ====================== -->\n<section class=\"colors\" data-screen-label=\"05 Colors\">\n  <div class=\"container\">\n    <div class=\"head\">\n      <div class=\"eyebrow on-dark\">05 — Palette<\u002Fdiv>\n      <h3 class=\"section-title\" style=\"color:#fff\">Blu elettrico, nero notte,<br>lime per <span style=\"color:var(--lime)\">accendere<\u002Fspan>.<\u002Fh3>\n      <p class=\"lead\" style=\"color:#9AA3B2\">Una palette ad alto contrasto: il blu è la voce, il navy è la pausa, gli accent (lime, ciano, viola) sono le parole che restano in mente.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"palette\">\n      <div class=\"swatch-card sw-blue\">\n        <div>\n          <div class=\"role\">Primary · CTA · Brand<\u002Fdiv>\n          <div class=\"label\" style=\"opacity:.6;margin-top:6px\">01 — Primary Blue<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"name\">Primary<br>Blue<\u002Fdiv>\n          <div class=\"hex\">#2563FF · rgb(37, 99, 255)<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch-card sw-navy\">\n        <div><div class=\"role\">Bg · Body type<\u002Fdiv><\u002Fdiv>\n        <div>\n          <div class=\"name\">Dark<br>Navy<\u002Fdiv>\n          <div class=\"hex\">#0A0F1C<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch-card sw-purple\">\n        <div><div class=\"role\">Hover · Secondary<\u002Fdiv><\u002Fdiv>\n        <div>\n          <div class=\"name\">Purple<\u002Fdiv>\n          <div class=\"hex\">#483DFF<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch-card sw-cyan\">\n        <div><div class=\"role\">Data · Icone<\u002Fdiv><\u002Fdiv>\n        <div>\n          <div class=\"name\">Cyan<\u002Fdiv>\n          <div class=\"hex\">#00E5D2<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch-card sw-lime\">\n        <div><div class=\"role\">Badge · Pop<\u002Fdiv><\u002Fdiv>\n        <div>\n          <div class=\"name\">Lime<\u002Fdiv>\n          <div class=\"hex\">#C6FF00<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch-card sw-gray\">\n        <div><div class=\"role\">Background<\u002Fdiv><\u002Fdiv>\n        <div>\n          <div class=\"name\">Light Gray<\u002Fdiv>\n          <div class=\"hex\">#F5F7FA<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====================== 06 TYPOGRAPHY ====================== -->\n<section class=\"type\" data-screen-label=\"06 Type\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n      <div class=\"eyebrow\">06 — Tipografia<\u002Fdiv>\n      <h3 class=\"section-title\">Silka. Geometrica.<br><span style=\"color:var(--blue)\">Diretta<\u002Fspan>.<\u002Fh3>\n      <p class=\"lead\">Una sans geometrica con personalità: leggibile nei body, decisa nei display. <b style=\"color:var(--ink)\">Bold<\u002Fb> per i titoli, Medium per i sottotitoli in Primary Blue, Regular per il corpo testo.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"type-grid\">\n      <div class=\"specimen\">\n        <div>\n          <div class=\"label\">Display<\u002Fdiv>\n          <div class=\"big\">Aa<b>!<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"name\">Silka<\u002Fdiv>\n          <div class=\"alt\">Alt · Google Fonts:<br>Inter / Montserrat<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"type-scale\">\n        <div class=\"type-row\">\n          <div class=\"tag\">H1 · Display<\u002Fdiv>\n          <div class=\"sample ts-h1\">Ideas that talk.<\u002Fdiv>\n          <div class=\"spec\">Bold · 64–128 / -3% tracking<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"type-row\">\n          <div class=\"tag\">H2 · Title<\u002Fdiv>\n          <div class=\"sample ts-h2\">Results that stay.<\u002Fdiv>\n          <div class=\"spec\">Bold · 40–64 / -2.5% tracking<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"type-row\">\n          <div class=\"tag\">H3 · Sub<\u002Fdiv>\n          <div class=\"sample ts-h3\">Strategia, prima di tutto.<\u002Fdiv>\n          <div class=\"spec\">Medium · 24–32 / Primary Blue<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"type-row\">\n          <div class=\"tag\">Body<\u002Fdiv>\n          <div class=\"sample ts-body\">Pensiamo, scriviamo, disegniamo e misuriamo. Ogni progetto è una conversazione che porta a un risultato.<\u002Fdiv>\n          <div class=\"spec\">Regular · 16–18 / 1.5 line-height<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"type-row\">\n          <div class=\"tag\">Mono · Tag<\u002Fdiv>\n          <div class=\"sample ts-mono\">N. 001 — Brand Book 2026<\u002Fdiv>\n          <div class=\"spec\">JetBrains Mono · 11–13 / +14% tracking<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ====================== 07 MISSION & VISION ====================== -->\n<section class=\"mission\" data-screen-label=\"07 Mission\">\n  <img class=\"bg-mark\" src=\"97ffb68e-35c1-440f-9a50-b61ff70eab2b\" alt=\"\" aria-hidden=\"true\">\n  <div class=\"container\">\n    <div class=\"section-head\">\n      <div class=\"eyebrow on-dark\" style=\"color:#fff\">07 — Mission &amp; Vision<\u002Fdiv>\n      <h3 class=\"section-title\" style=\"color:#fff\">Costruiamo identità,<br>generiamo <span style=\"color:var(--lime)\">fatturato<\u002Fspan>.<\u002Fh3>\n    <\u002Fdiv>\n\n    <div class=\"mission-grid\">\n      <div class=\"mission-block\">\n        <span class=\"tag\">Mission · oggi<\u002Fspan>\n        <h4>Trasformiamo idee in messaggi che convertono.<\u002Fh4>\n        <p>Idee che si fanno notare ed emozionano, ma soprattutto che convertono. Costruiamo identità visive forti e le usiamo come motore strategico per generare contatti qualificati e vendite per i nostri clienti.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"mission-block vision\">\n        <span class=\"tag\">Vision · domani<\u002Fspan>\n        <h4>Il partner di crescita di chi non si accontenta.<\u002Fh4>\n        <p>Diventare il partner definitivo per le aziende che non vogliono solo \"essere belle online\", ma dominare il loro mercato trasformando l'attenzione in fatturato.<\u002Fp>\n      <\u002Fdiv>\n    <\u002
